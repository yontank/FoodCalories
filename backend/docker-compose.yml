version: "3.9"

services:

  backend:
    build:
      context: .
    container_name: foodcalories_backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGIN: http://localhost:5173
      ENVIRONMENT: production
      PORT: 8000
    ports:
      - "8000:8000"
  db:
    image: postgres:16
    container_name: foodcalories_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
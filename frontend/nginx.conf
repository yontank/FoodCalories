server {
  listen 80;
  listen 443 ssl;
  server_name _;
  ssl_certificate /etc/ssl/certs/foodcal.pem;
  ssl_certificate_key /etc/ssl/private/foodcal.pem;

  root /usr/share/nginx/html;
  index index.html;

  # API requests -> backend
  location /api/ {
    proxy_pass http://foodcalories_backend:8000/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }
}
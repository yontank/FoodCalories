version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: foodcalories_backend
    restart: no
    env_file:
      - .env
    ports:
      - "8000:8000"
  
  frontend:
    build: ./frontend
    container_name: foodcalories_frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - "backend"

services:
  db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: foodcalories_db
    restart: no
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - foodcal_db:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
      target: dev
    container_name: foodcalories_backend
    restart: no
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    depends_on:
      - db

  frontend:
    env_file:
      - ./frontend/.env
    build:
      context: ./frontend
      target: dev
    container_name: foodcalories_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  foodcal_db:


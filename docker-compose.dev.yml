services:
  db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: foodcalories_db
    restart: no
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - foodcal_db:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    container_name: foodcalories_backend
    restart: no
    env_file:
      - .env
    environment:
      - DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    depends_on:
      - db

  frontend:
    working_dir: /app
    image: public.ecr.aws/docker/library/node:20-alpine
    container_name: foodcalories_frontend
    volumes: 
      - ./frontend:/app
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://foodcalories_backend:8000

    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  foodcal_db:


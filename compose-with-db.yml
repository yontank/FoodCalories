include:
  - docker-compose.yml

services:
  db:
    image: postgres:16
    container_name: foodcalories_db
    restart: always
    environment:
      POSTGRES_USER: fooduser
      POSTGRES_PASSWORD: foodpassword
      POSTGRES_DB: fooddb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: